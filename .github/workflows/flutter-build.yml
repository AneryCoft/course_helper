name: Flutter Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build All Platforms
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        # os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: android
          # - os: macos-latest
          #   platform: ios
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java (Android only)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
          cache-dependency-path: |
            android/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: "true"

      - name: Install dependencies
        run: flutter pub get

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Using app version: $VERSION"

      - name: Setup Android signing (Android only)
        if: matrix.platform == 'android'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/anerycoft.jks
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=../anerycoft.jks" >> android/key.properties

      - name: Build Android APK (split-per-abi)
        if: matrix.platform == 'android'
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        if: matrix.platform == 'android'
        run: |
          VERSION="${{ steps.version.outputs.APP_VERSION }}"
          cd build/app/outputs/flutter-apk
          for file in app-*-release.apk; do
            abi=$(echo "$file" | sed -E 's/app-(.*)-release\.apk/\1/')
            mv "$file" "CourseHelper_${VERSION}_${abi}.apk"
          done
          ls -l

      - name: Upload Android artifacts
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/CourseHelper_*.apk   # 匹配重命名后的文件
          if-no-files-found: error

      # - name: Build iOS
      #   if: matrix.platform == 'ios'
      #   run: |
      #     flutter build ios --release --no-codesign
      #     cd build/ios/iphoneos
      #     mkdir Payload
      #     cp -r Runner.app Payload/
      #     zip -r CourseHelper.ipa Payload

      # - name: Upload iOS artifacts
      #   if: matrix.platform == 'ios'
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ios-ipa
      #     path: build/ios/iphoneos/CourseHelper.ipa
      #     if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Get version from tag
        id: get_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "VERSION=$TAG" >> $GITHUB_OUTPUT

      - name: Get tag message
        id: tag_message
        run: |
          TAG_MSG=$(git tag -l --format='%(contents)' ${{ steps.get_version.outputs.VERSION }})
          if [ -z "$TAG_MSG" ]; then
            TAG_MSG="Automated release for version ${{ steps.get_version.outputs.VERSION }}"
          fi
          echo "TAG_MSG<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-assets/android-apk/*.apk
            # release-assets/ios-ipa/CourseHelper.ipa
          name: Release ${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.tag_message.outputs.TAG_MSG }}
          update_release: true