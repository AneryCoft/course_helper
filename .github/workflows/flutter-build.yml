name: Flutter Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.35.4"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build All Platforms
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        # os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: android
          # - os: macos-latest
          #   platform: ios
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java (Android only)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Android signing (Android only)
        if: matrix.platform == 'android'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/anerycoft.jks
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=../anerycoft.jks" >> android/key.properties

      - name: Build Android APK (split-per-abi)
        if: matrix.platform == 'android'
        run: flutter build apk --release --split-per-abi

      # - name: Build iOS
      #   if: matrix.platform == 'ios'
      #   run: |
      #     flutter build ios --release --no-codesign
      #     cd build/ios/iphoneos
      #     mkdir Payload
      #     cp -r Runner.app Payload/
      #     zip -r CourseHelper.ipa Payload

      - name: Upload Android artifacts
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

      # - name: Upload iOS artifacts
      #   if: matrix.platform == 'ios'
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ios-ipa
      #     path: build/ios/iphoneos/CourseHelper.ipa
      #     if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Get version from tag
        id: get_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "VERSION=$TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-assets/android-apk/*.apk
            # release-assets/ios-ipa/CourseHelper.ipa
          name: Release ${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          body: |
            Automated release for version ${{ steps.get_version.outputs.VERSION }}
          update_release: true